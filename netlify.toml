[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # VITE_-vars är publika per design (bakas in i klient-bundeln, anon-key är
  # avsedd för browsers per Supabase-arkitektur). Hoppa scanner för dessa.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,SUPABASE_URL,NOTIFICATION_EMAIL"

[functions."ai-search"]
  # Höjt från 10s så Claude-generering med 8 chunks hinner klart
  timeout = 26

[functions."ingest-url"]
  # URL-fetch + chunking + Voyage embed för en hel sida
  timeout = 26

[functions."mail-assistant"]
  # Genererar ett färdigt svar på kundmail via RAG + Claude
  timeout = 26

[functions."fee-calculator"]
  # Räknar ut El-kretsen-avgift för en produktbeskrivning
  timeout = 26

[functions."ingest-file"]
  # Chunka + embedda uppladdad TXT-fil
  timeout = 26

[functions."kb-audit-contradictions"]
  # Nattlig motsägelsedetektion mellan chunks — 26s hård gräns
  timeout = 26

[functions."review-action"]
  # Mark resolve/ignore/reopen på en review-rad
  timeout = 10

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"
