<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-kretsen Intranät</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ── Dynamiska Teman (CSS Variabler) ── */
        :root {
            --primary: #06B4E4;
            --primary-dark: #0891B2;
            --bg-gradient: linear-gradient(150deg, #f0f9ff 0%, #e0f2fe 40%, #f8fafc 100%);
            --header-gradient: linear-gradient(135deg, #06B4E4 0%, #0369A1 100%);
        }

        [data-theme='green'] {
            --primary: #10B981;
            --primary-dark: #059669;
            --bg-gradient: linear-gradient(150deg, #ecfdf5 0%, #d1fae5 40%, #f8fafc 100%);
            --header-gradient: linear-gradient(135deg, #10B981 0%, #065F46 100%);
        }

        [data-theme='orange'] {
            --primary: #F59E0B;
            --primary-dark: #D97706;
            --bg-gradient: linear-gradient(150deg, #fffbeb 0%, #fef3c7 40%, #f8fafc 100%);
            --header-gradient: linear-gradient(135deg, #F59E0B 0%, #92400E 100%);
        }

        [data-theme='dark'] {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --bg-gradient: linear-gradient(150deg, #111827 0%, #1F2937 100%);
            --header-gradient: linear-gradient(135deg, #312E81 0%, #111827 100%);
        }

        /* ── App-övergripande styling ── */
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .bg-header { background: var(--header-gradient); }
        .bg-app { background: var(--bg-gradient); }

        .nav-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 14px 20px; font-size: 14px; font-weight: 600;
            border-bottom: 3px solid transparent; color: #6B7280;
            background: none; border: none; cursor: pointer; transition: all 0.2s;
        }
        .nav-tab:hover { color: var(--primary); border-bottom-color: #CBD5E1; }
        .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .kk-primary-btn {
            width: 100%; padding: 15px 0; background: var(--header-gradient);
            color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1); transition: all 0.2s;
        }
        .kk-primary-btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }

        .kk-card {
            background: white; border-radius: 20px; padding: 32px 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 100%; max-width: 460px;
        }

        .kk-score-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 16px; background: white;
            border: 1px solid #F1F5F9; transition: all 0.2s;
        }
        .kk-rank-gold { background: #FEF9C3; border-color: #FDE047; }
        .kk-rank-silver { background: #F1F5F9; border-color: #CBD5E1; }
        .kk-rank-bronze { background: #FFEDD5; border-color: #FED7AA; }

        .kk-dot { display:inline-block; width:10px; height:10px; border-radius:50%; background: var(--primary); animation: kk-dot-bounce 1.4s infinite; }
        @keyframes kk-dot-bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1.1);opacity:1} }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col" data-theme="default">

    <div id="login-screen" class="flex flex-col items-center justify-center h-full bg-app">
        <div class="kk-card text-center">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center text-white font-bold text-2xl">EK</div>
            </div>
            <h1 class="text-xl font-bold mb-6">Välkommen till Kunskapskretsen</h1>
            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">E-post</label>
                    <input type="email" id="email" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Lösenord</label>
                    <input type="password" id="password" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all">
                </div>
                <button type="submit" class="kk-primary-btn mt-4">Logga in</button>
                <p id="error-message" class="text-red-500 text-sm hidden text-center"></p>
            </form>
        </div>
    </div>

    <div id="intranet-screen" class="hidden h-full flex flex-col">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <img src="HÄR_KLISTRAR_DU_IN_DIN_PUBLIC_URL_TILL_LOGGAN" alt="El-kretsen" class="h-8 w-auto">
                <h1 class="text-lg font-bold border-l pl-4 border-gray-200 hidden sm:block">Intranät</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="flex bg-gray-100 p-1 rounded-full border border-gray-200">
                    <button onclick="setTheme('default')" class="w-6 h-6 rounded-full bg-[#06B4E4] border-2 border-white shadow-sm mr-1"></button>
                    <button onclick="setTheme('green')" class="w-6 h-6 rounded-full bg-[#10B981] border-2 border-white shadow-sm mr-1"></button>
                    <button onclick="setTheme('orange')" class="w-6 h-6 rounded-full bg-[#F59E0B] border-2 border-white shadow-sm mr-1"></button>
                    <button onclick="setTheme('dark')" class="w-6 h-6 rounded-full bg-[#111827] border-2 border-white shadow-sm"></button>
                </div>

                <button id="logout-btn" class="text-xs font-bold uppercase text-gray-500 hover:text-red-500 transition-colors">Logga ut</button>
            </div>
        </header>

        <nav class="bg-white border-b border-gray-200 px-4 flex items-center">
            <button id="tab-elvis" class="nav-tab active" onclick="switchTab('elvis')">Fråga ELvis</button>
            <button id="tab-kretskampen" class="nav-tab" onclick="switchTab('kretskampen')">Kretskampen <span class="ml-2 px-2 py-0.5 bg-primary text-white text-[10px] rounded-full">NY</span></button>
        </nav>

        <div id="content-elvis" class="flex flex-1 overflow-hidden">
            <main class="flex-1 bg-gray-50 p-6 flex flex-col">
                <div class="flex-1 bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
                    <zapier-interfaces-chatbot-embed is-popup='false' chatbot-id='cmkpsh9h5001bobaanf41g3v6' style='width: 100%; height: 100%;'></zapier-interfaces-chatbot-embed>
                </div>
            </main>
        </div>

        <div id="content-kretskampen" class="hidden flex-1 overflow-auto bg-app">
            <div id="quiz-root" style="min-height: 100%;"></div>
        </div>
    </div>

    <script>
        /* ── Vanilla JS Logik & Tema ── */
        const SUPABASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impud2F0Ym5rZHp1eWhxbWNlcmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczNDcsImV4cCI6MjA4ODA1MzM0N30._A6BCYepTsITJNYgJBUPb79TDR3ln45DPvbmy8Igyoo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Tema-hantering
        function setTheme(themeName) {
            document.body.setAttribute('data-theme', themeName);
            localStorage.setItem('user-theme', themeName);
        }
        // Ladda sparat tema
        const savedTheme = localStorage.getItem('user-theme') || 'default';
        setTheme(savedTheme);

        const loginScreen = document.getElementById('login-screen');
        const intranetScreen = document.getElementById('intranet-screen');
        const errorMsg = document.getElementById('error-message');

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showIntranet();
        }
        checkSession();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });
            if (error) { errorMsg.textContent = 'Fel e-post eller lösenord'; errorMsg.classList.remove('hidden'); }
            else { showIntranet(); }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            location.reload();
        });

        function showIntranet() {
            loginScreen.classList.add('hidden');
            intranetScreen.classList.remove('hidden');
        }

        let quizMounted = false;
        function switchTab(tab) {
            const contents = { elvis: document.getElementById('content-elvis'), kretskampen: document.getElementById('content-kretskampen') };
            const tabs = { elvis: document.getElementById('tab-elvis'), kretskampen: document.getElementById('tab-kretskampen') };
            
            Object.keys(contents).forEach(k => {
                contents[k].classList.toggle('hidden', k !== tab);
                tabs[k].classList.toggle('active', k === tab);
            });

            if (tab === 'kretskampen' && !quizMounted) {
                quizMounted = true;
                const root = ReactDOM.createRoot(document.getElementById('quiz-root'));
                root.render(React.createElement(window.KretskampenApp));
            }
        }
    </script>

    <script type="text/babel" data-presets="react">
        const KNOWLEDGE_BASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co/storage/v1/object/sign/Quiz%20dokument/Elkretsen_Kunskapsbas_Samlad_Quiz.txt?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9hMDg2ZWVkMy1mZDdhLTQ0NWYtOTY5OS1iMDViNDE1NDI5MzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJRdWl6IGRva3VtZW50L0Vsa3JldHNlbl9LdW5za2Fwc2Jhc19TYW1sYWRfUXVpei50eHQiLCJpYXQiOjE3NzI2NTI2NzYsImV4cCI6NDkyNjI1MjY3Nn0.3zkcFjaJmwLPFEoWa9sJx15eq2xil9NiteRPb76mtKQ';
        
        async function getKnowledgeBase() {
            const response = await fetch(KNOWLEDGE_BASE_URL);
            return await response.text();
        }

        const CATEGORIES = [
            { id: 'all', label: 'Alla kategorier', emoji: '⚡' },
            { id: 'C', label: 'EU & Reglering', emoji: '🇪🇺' },
            { id: 'A', label: 'Ekonomi', emoji: '💰' },
            { id: 'B', label: 'Teknik', emoji: '🔧' },
            { id: 'D', label: 'Juridik', emoji: '⚖️' },
        ];

        async function generateQuestions(category, count) {
            const kb = await getKnowledgeBase();
            const seed = new Date().getTime();
            const prompt = `SESSION: ${seed}. Skapa ${count} frågor från HELA dokumentet. Hoppa runt! Kunskapsbas: ${kb}. Svara KORTFATTAT i JSON-format.`;
            
            const res = await fetch('https://jnwatbnkdzuyhqmcerej.supabase.co/functions/v1/smooth-action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
            return JSON.parse(text.replace(/```json|```/g, '').trim()).questions;
        }

        /* ── REACT COMPONENTS ── */
        function KretskampenApp() {
            const [screen, setScreen] = React.useState('home');
            const [questions, setQuestions] = React.useState([]);
            const [player, setPlayer] = React.useState('');
            const [score, setScore] = React.useState(0);
            const [loading, setLoading] = React.useState(false);

            const startQuiz = async (name, cat, count) => {
                setPlayer(name); setLoading(true); setScreen('loading');
                try {
                    const qs = await generateQuestions(cat, count);
                    setQuestions(qs); setScreen('quiz');
                } catch(e) { alert('Fel vid AI-generering'); setScreen('home'); }
                setLoading(false);
            };

            if (screen === 'home') return (
                <div className="flex flex-col items-center py-12 px-4">
                    <div className="kk-card">
                        <h2 className="text-3xl font-black font-barlow-condensed mb-2 uppercase italic text-primary">⚡ Kretskampen</h2>
                        <p class="text-gray-500 mb-8 text-sm">Utmana kollegorna i El-kretsens stora kunskapskamp!</p>
                        <div class="mb-6">
                            <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Ditt Namn</label>
                            <input class="kk-input" value={player} onChange={e=>setPlayer(e.target.value)} placeholder="T.ex. Magnus..." />
                        </div>
                        <button class="kk-primary-btn" disabled={!player} onClick={()=>startQuiz(player, 'all', 10)}>Starta Kampen 🚀</button>
                        <button onClick={()=>setScreen('leaderboard')} class="w-full mt-4 text-xs font-bold uppercase text-gray-400 hover:text-primary transition-colors">Visa Highscore 🏆</button>
                    </div>
                </div>
            );

            if (screen === 'loading') return (
                <div className="flex flex-col items-center justify-center py-20">
                    <div className="kk-dot mb-4"></div>
                    <p class="font-bold text-primary italic uppercase tracking-widest">AI förbereder dina frågor...</p>
                </div>
            );

            if (screen === 'quiz') return (
                <QuizWindow questions={questions} player={player} onFinish={(s)=>{setScore(s); setScreen('result');}} />
            );

            if (screen === 'result') return (
                <div className="flex flex-col items-center py-12">
                    <div className="kk-card text-center">
                        <div class="text-6xl mb-4">🏆</div>
                        <h2 class="text-2xl font-bold mb-2">Snyggt jobbat, {player}!</h2>
                        <div class="bg-gray-50 p-8 rounded-3xl my-6 border border-gray-100">
                            <div class="text-xs uppercase text-gray-400 font-bold mb-1">Slutpoäng</div>
                            <div class="text-5xl font-black text-primary">{score}</div>
                        </div>
                        <button class="kk-primary-btn mb-4" onClick={()=>setScreen('leaderboard')}>Se var du hamnade 🏅</button>
                        <button class="text-gray-400 text-sm font-bold uppercase" onClick={()=>setScreen('home')}>Spela igen</button>
                    </div>
                </div>
            );

            if (screen === 'leaderboard') return <Leaderboard onBack={()=>setScreen('home')} player={player} score={score} />;
        }

        function QuizWindow({ questions, player, onFinish }) {
            const [idx, setIdx] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [selected, setSelected] = React.useState(null);
            const q = questions[idx];

            const handleAns = (i) => {
                if (selected !== null) return;
                setSelected(i);
                if (i === q.correct) setScore(s => s + 1000);
            };

            return (
                <div className="flex flex-col items-center py-8 px-4">
                    <div className="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                        <div className="bg-header p-6 text-white flex justify-between items-center">
                            <div>
                                <div class="text-[10px] uppercase font-bold opacity-70">Fråga {idx+1}/{questions.length}</div>
                                <div class="text-lg font-bold">{player}</div>
                            </div>
                            <div class="text-right">
                                <div class="text-[10px] uppercase font-bold opacity-70">Poäng</div>
                                <div class="text-2xl font-black">{score}</div>
                            </div>
                        </div>
                        <div class="p-8">
                            <h3 class="text-2xl font-bold mb-8 text-center leading-tight">{q.question}</h3>
                            <div class="grid gap-3">
                                {q.answers.map((a, i) => {
                                    let color = "bg-gray-50 hover:bg-gray-100 text-gray-700 border-gray-200";
                                    if (selected !== null) {
                                        if (i === q.correct) color = "bg-green-500 text-white border-green-600";
                                        else if (i === selected) color = "bg-red-500 text-white border-red-600";
                                        else color = "bg-gray-50 opacity-40 text-gray-400";
                                    }
                                    return <button onClick={()=>handleAns(i)} class={`p-4 rounded-2xl border-2 text-left font-semibold transition-all ${color}`}>{a}</button>
                                })}
                            </div>
                            {selected !== null && (
                                <div class="mt-8 kk-fadein">
                                    <div class="p-4 bg-blue-50 rounded-2xl text-sm text-blue-800 border border-blue-100 mb-4">{q.explanation}</div>
                                    <button class="kk-primary-btn" onClick={()=>{ if(idx < questions.length-1){ setIdx(idx+1); setSelected(null); } else { onFinish(score); }}}>Nästa Fråga →</button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function Leaderboard({ onBack, player, score }) {
            const [list, setList] = React.useState([]);
            React.useEffect(() => {
                supabaseClient.from('kretskampen_scores').select('*').order('score', {ascending:false}).limit(20)
                .then(({data})=>setList(data || []));
            }, []);

            return (
                <div className="flex flex-col items-center py-12 px-4">
                    <div className="w-full max-w-lg">
                        <button onClick={onBack} class="mb-6 text-xs font-bold uppercase text-gray-400 hover:text-primary">← Tillbaka</button>
                        <h2 class="text-4xl font-black font-barlow-condensed italic uppercase text-primary mb-8 text-center">Tavla över Hjältar 🏅</h2>
                        <div class="space-y-3">
                            {list.map((s, i) => {
                                const isMe = s.name === player && s.score === score;
                                const rankClass = i === 0 ? 'kk-rank-gold' : i === 1 ? 'kk-rank-silver' : i === 2 ? 'kk-rank-bronze' : '';
                                return (
                                    <div key={i} class={`kk-score-row ${rankClass} ${isMe ? 'ring-2 ring-primary ring-offset-2' : ''}`}>
                                        <div class="text-2xl font-black font-barlow-condensed italic w-8">{i+1}</div>
                                        <div class="flex-1">
                                            <div class="font-bold">{s.name} {isMe && '(DIG!)'}</div>
                                            <div class="text-[10px] uppercase text-gray-400">{new Date(s.played_at).toLocaleDateString()}</div>
                                        </div>
                                        <div class="text-xl font-black text-primary font-barlow-condensed italic">{s.score}</div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        window.KretskampenApp = KretskampenApp;
    </script>
</body>
</html>
