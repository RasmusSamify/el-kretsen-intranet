<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-kretsen Intranät</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <div id="login-screen" class="flex flex-col items-center justify-center h-full">
        <div class="bg-white p-10 rounded-xl shadow-lg w-96 border border-gray-100">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-[#06B4E4] rounded-full flex items-center justify-center text-white font-bold text-2xl">EK</div>
            </div>
            
            <h1 class="text-xl font-bold text-gray-800 mb-2 text-center">Kunskapskretsen</h1>
            <p class="text-sm text-gray-500 mb-6 text-center">Logga in för att få tillgång till dokument och ELvis.</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">E-post / Användarnamn</label>
                    <input type="email" id="email" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-[#06B4E4] focus:border-[#06B4E4] transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Lösenord</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-[#06B4E4] focus:border-[#06B4E4] transition-all">
                </div>
                <button type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-[#06B4E4] hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors mt-4">
                    Logga in
                </button>
                <p id="error-message" class="text-red-500 text-sm hidden text-center mt-3"></p>
            </form>
        </div>
    </div>

    <div id="intranet-screen" class="hidden h-full flex flex-col">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#06B4E4] rounded flex items-center justify-center text-white font-bold text-xs">EK</div>
                <h1 class="text-lg font-semibold text-gray-800 border-l border-gray-300 pl-3">Intranät</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="document.getElementById('feedback-modal').classList.remove('hidden')" class="text-sm text-white bg-[#06B4E4] hover:bg-blue-500 px-4 py-1.5 rounded-lg transition-colors font-medium flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"></path></svg>
                    Feedback
                </button>
                <button id="logout-btn" class="text-sm text-gray-600 border border-gray-300 hover:bg-gray-100 px-4 py-1.5 rounded-lg transition-colors font-medium">Logga ut</button>
            </div>

            <!-- Feedback Modal -->
            <div id="feedback-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-xl w-full max-w-lg mx-4 overflow-hidden">
                    <div class="flex justify-between items-center px-5 py-4 border-b border-gray-200">
                        <h3 class="font-semibold text-gray-800">Skicka feedback</h3>
                        <button onclick="document.getElementById('feedback-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xl font-bold leading-none">&times;</button>
                    </div>
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdCmi8SVddoUUufsWVYSR84yjggY4FoUGH6xoAmkY1L09JMKQ/viewform?embedded=true" width="100%" height="520" frameborder="0" marginheight="0" marginwidth="0">Läser in...</iframe>
                </div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            
            <main class="flex-1 bg-gray-50 p-6 flex flex-col">
                <div class="flex items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Fråga ELvis</h2>
                    <span class="ml-3 bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">Online</span>
                </div>
                
                <div class="flex-1 bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200 relative" style="min-height: 0;">
                    <zapier-interfaces-chatbot-embed 
                        is-popup='false' 
                        chatbot-id='cmkpsh9h5001bobaanf41g3v6' 
                        style='width: 100%; height: 100%; display: block;'>
                    </zapier-interfaces-chatbot-embed>
                </div>
            </main>

            <aside class="w-1/3 max-w-sm bg-white p-6 border-l border-gray-200 overflow-y-auto shadow-inner flex flex-col">
                <h2 class="text-lg font-bold mb-2 text-gray-800">Dokument & Rutiner</h2>
                <p class="text-sm text-gray-500 mb-4">Sök bland filer som ELvis hänvisar till.</p>
                
                <div class="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <h3 class="text-sm font-semibold text-gray-700 mb-2">Ladda upp nytt dokument</h3>
                    <input type="file" id="file-upload" class="block w-full text-xs text-gray-500 file:mr-4 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-[#06B4E4] file:text-white hover:file:bg-blue-500 cursor-pointer mb-2">
                    <button id="upload-btn" class="w-full bg-white border border-[#06B4E4] text-[#06B4E4] text-xs font-medium py-1.5 rounded hover:bg-[#06B4E4] hover:text-white transition">Skicka till kunskapsbanken</button>
                    <p id="upload-status" class="text-xs mt-2 hidden text-center"></p>
                </div>

                <div class="mb-4">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Sök dokument..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#06B4E4] focus:border-transparent text-sm">
                        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>

                <ul class="space-y-2 flex-1 overflow-y-auto" id="document-list">
                    <li class="text-sm text-gray-500 text-center py-4">Laddar dokument...</li>
                </ul>
            </aside>
            
        </div>
    </div>

    <script>
        // 1. SUPABASE UPPGIFTER
        const SUPABASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impud2F0Ym5rZHp1eWhxbWNlcmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczNDcsImV4cCI6MjA4ODA1MzM0N30._A6BCYepTsITJNYgJBUPb79TDR3ln45DPvbmy8Igyoo'; 
        const BUCKET_NAME = 'intranet-dokument'; // VIKTIGT: Måste matcha mappen i Supabase exakt!

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Element
        const loginScreen = document.getElementById('login-screen');
        const intranetScreen = document.getElementById('intranet-screen');
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-message');
        const logoutBtn = document.getElementById('logout-btn');
        const documentList = document.getElementById('document-list');
        const searchInput = document.getElementById('search-input');
        
        // Uppladdnings-element
        const fileUpload = document.getElementById('file-upload');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');

        // Ladda in dokument från Supabase
        async function loadDocuments() {
            documentList.innerHTML = '<li class="text-sm text-gray-500 py-2">Hämtar filer från Supabase...</li>';
            
            // Hämta listan med filer
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list();

            if (error) {
                documentList.innerHTML = '<li class="text-sm text-red-500 py-2">Kunde inte hämta dokument. Se till att Bucketen finns!</li>';
                console.error(error);
                return;
            }

            documentList.innerHTML = ''; // Rensa listan

            if (!data || data.length === 0) {
                documentList.innerHTML = '<li class="text-sm text-gray-400 py-2">Inga dokument uppladdade ännu.</li>';
                return;
            }

            // Loopa igenom och skapa HTML för varje fil
            data.forEach(file => {
                if (file.name === '.emptyFolderPlaceholder') return; // Ignorera dolda systemfiler

                // Hämta URL till filen
                const { data: publicUrlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(file.name);
                
                const li = document.createElement('li');
                li.className = 'doc-item';
                li.innerHTML = `
                    <a class="flex items-center p-3 rounded-lg hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-all text-gray-700 hover:text-[#06B4E4] group cursor-pointer">
                        <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-[#06B4E4] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <span class="font-medium text-sm truncate">${file.name}</span>
                    </a>
                `;

                // Öppna HTML-filer via Blob så att de renderas korrekt i webbläsaren
                li.querySelector('a').addEventListener('click', async () => {
                    const fileUrl = publicUrlData.publicUrl;
                    if (file.name.endsWith('.html')) {
                        const response = await fetch(fileUrl);
                        const html = await response.text();
                        const blob = new Blob([html], { type: 'text/html' });
                        const blobUrl = URL.createObjectURL(blob);
                        window.open(blobUrl, '_blank');
                    } else {
                        window.open(fileUrl, '_blank');
                    }
                });

                documentList.appendChild(li);
            });
        }

        // Hantera Fil-uppladdning
        uploadBtn.addEventListener('click', async () => {
            const file = fileUpload.files[0];
            
            if (!file) {
                showUploadStatus('Välj en fil först!', 'text-red-500');
                return;
            }

            showUploadStatus('Laddar upp...', 'text-[#06B4E4]');
            uploadBtn.disabled = true;

            // Sätt rätt content-type så att HTML renderas korrekt i webbläsaren
            const contentType = file.name.endsWith('.html') ? 'text/html' : file.type;

            const { data, error } = await supabaseClient.storage
                .from(BUCKET_NAME)
                .upload(file.name, file, {
                    cacheControl: '3600',
                    upsert: true, // Skriver över om filen redan finns
                    contentType: contentType
                });

            uploadBtn.disabled = false;

            if (error) {
                showUploadStatus('Fel: ' + error.message, 'text-red-500');
            } else {
                showUploadStatus('Uppladdning lyckades!', 'text-green-500');
                fileUpload.value = ''; // Rensa fältet
                loadDocuments(); // Ladda om listan direkt!
                
                // Göm success-meddelandet efter 3 sekunder
                setTimeout(() => { uploadStatus.classList.add('hidden'); }, 3000);
            }
        });

        function showUploadStatus(msg, colorClass) {
            uploadStatus.textContent = msg;
            uploadStatus.className = `text-xs mt-2 block ${colorClass}`;
        }

        // Dynamisk Sök-logik
        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const docItems = document.querySelectorAll('.doc-item'); // Måste leta upp dem på nytt varje gång eftersom vi bygger listan dynamiskt
            
            docItems.forEach(function(item) {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        // Kolla inloggning och ladda dokument
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showIntranet();
            }
        }
        checkSession();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.textContent = 'Fel e-post eller lösenord. Försök igen.';
                errorMsg.classList.remove('hidden');
            } else {
                showIntranet();
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            loginScreen.classList.remove('hidden');
            intranetScreen.classList.add('hidden');
            document.getElementById('password').value = ''; 
        });

        function showIntranet() {
            loginScreen.classList.add('hidden');
            intranetScreen.classList.remove('hidden');
            loadDocuments(); // Hämta filerna från Supabase direkt när man loggar in!
        }
    </script>
</body>
</html>
