<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-kretsen Intranät</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
    <!-- React + Babel för KRETSKAMPEN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ── Tab-navigation ── */
        .nav-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 14px 20px; font-size: 14px; font-weight: 600;
            border-bottom: 3px solid transparent; color: #6B7280;
            background: none; border-top: none; border-left: none; border-right: none;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .nav-tab:hover { color: #06B4E4; border-bottom-color: #BAE6FD; }
        .nav-tab.active { color: #06B4E4; border-bottom-color: #06B4E4; }
        .nav-tab .tab-badge {
            background: linear-gradient(135deg, #06B4E4, #0891B2);
            color: white; font-size: 10px; font-weight: 800;
            padding: 1px 7px; border-radius: 20px;
            font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px;
        }

        /* ── KRETSKAMPEN Quiz Styles ── */
        .kk-screen { font-family: 'Barlow', sans-serif; }

        .kk-home-bg {
            background: linear-gradient(150deg, #f0f9ff 0%, #e0f2fe 40%, #f8fafc 100%);
            min-height: 100%; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 32px 16px;
        }
        .kk-card {
            background: white; border-radius: 20px; padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(6,180,228,0.12), 0 2px 8px rgba(0,0,0,0.06);
            width: 100%; max-width: 460px;
        }
        .kk-logo-circle {
            width: 56px; height: 56px; border-radius: 14px;
            background: linear-gradient(135deg, #06B4E4 0%, #0891B2 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; box-shadow: 0 4px 16px rgba(6,180,228,0.35);
        }
        .kk-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900; letter-spacing: 2px; text-transform: uppercase;
        }
        .kk-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px; font-weight: 700; color: #9CA3AF;
            letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px;
        }
        .kk-input {
            width: 100%; padding: 12px 14px; border-radius: 12px;
            border: 2px solid #E5E7EB; font-size: 15px; font-family: 'Barlow', sans-serif;
            outline: none; box-sizing: border-box; transition: border-color 0.2s;
            background: #FAFAFA;
        }
        .kk-input:focus { border-color: #06B4E4; background: white; }
        .kk-cat-btn {
            display: flex; align-items: center; gap: 10px; width: 100%;
            padding: 11px 14px; border-radius: 12px; border: 2px solid #E5E7EB;
            cursor: pointer; transition: all 0.18s; font-family: 'Barlow', sans-serif;
            font-size: 14px; font-weight: 600; background: #FAFAFA; color: #374151;
            margin-bottom: 8px;
        }
        .kk-cat-btn.selected {
            background: #06B4E4; color: white; border-color: #06B4E4;
            box-shadow: 0 4px 12px rgba(6,180,228,0.25);
        }
        .kk-cat-btn:hover:not(.selected) { border-color: #06B4E4; color: #06B4E4; background: #F0FAFF; }
        .kk-qcount-btn {
            flex: 1; padding: 12px 0; border: 2px solid #E5E7EB; border-radius: 12px;
            cursor: pointer; font-weight: 700; font-size: 16px; font-family: 'Barlow Condensed', sans-serif;
            transition: all 0.18s; background: white; color: #374151;
        }
        .kk-qcount-btn.selected { background: #06B4E4; color: white; border-color: #06B4E4; box-shadow: 0 4px 12px rgba(6,180,228,0.25); }
        .kk-qcount-btn:hover:not(.selected) { border-color: #06B4E4; color: #06B4E4; }

        .kk-primary-btn {
            width: 100%; padding: 15px 0; background: linear-gradient(135deg, #06B4E4 0%, #0891B2 100%);
            color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700;
            cursor: pointer; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(6,180,228,0.35); transition: all 0.2s;
        }
        .kk-primary-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(6,180,228,0.45); }
        .kk-primary-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .kk-ghost-btn {
            background: none; border: 2px solid #E5E7EB; border-radius: 12px;
            padding: 10px 18px; font-family: 'Barlow', sans-serif; font-size: 14px;
            font-weight: 600; color: #6B7280; cursor: pointer; transition: all 0.2s;
        }
        .kk-ghost-btn:hover { border-color: #06B4E4; color: #06B4E4; }

        /* Answer buttons */
        .kk-answer-btn {
            padding: 18px 14px; border-radius: 14px; border: none; color: white;
            cursor: pointer; text-align: left; transition: all 0.25s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        .kk-answer-btn:hover:not(:disabled) { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .kk-answer-btn:disabled { cursor: default; }

        /* Timer ring animation */
        @keyframes kk-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
        @keyframes kk-spin { to{transform:rotate(360deg)} }
        @keyframes kk-fadein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes kk-pop { 0%{transform:scale(0.85)} 60%{transform:scale(1.08)} 100%{transform:scale(1)} }
        .kk-fadein { animation: kk-fadein 0.35s ease forwards; }

        /* Leaderboard */
        .kk-score-row {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-radius: 14px; background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.15s;
        }
        .kk-score-row:hover { transform: translateX(3px); }
        .kk-score-row.me {
            background: linear-gradient(135deg, #06B4E4 0%, #0891B2 100%);
            box-shadow: 0 6px 20px rgba(6,180,228,0.3);
        }

        /* Loading dots */
        .kk-dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#06B4E4; animation: kk-dot-bounce 1.4s infinite; }
        .kk-dot:nth-child(2){animation-delay:.2s} .kk-dot:nth-child(3){animation-delay:.4s}
        @keyframes kk-dot-bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.5} 40%{transform:scale(1.1);opacity:1} }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"></path></svg>

                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdCmi8SVddoUUufsWVYSR84yjggY4FoUGH6xoAmkY1L09JMKQ/viewform?embedded=true" width="100%" height="520" frameborder="0" marginheight="0" marginwidth="0">Läser in...</iframe>

                Kretskampen
                <span class="tab-badge">NYTT</span>

        <!-- ════ FLIK 1: ELvis ════ -->
        <div id="content-elvis" class="flex flex-1 overflow-hidden">
            <main class="flex-1 bg-gray-50 p-6 flex flex-col">
                <div class="flex items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">Fråga ELvis</h2>
                    <span class="ml-3 bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">Online</span>

                    <zapier-interfaces-chatbot-embed

                        chatbot-id='cmkpsh9h5001bobaanf41g3v6'

                    </zapier-interfaces-chatbot-embed>
                </div>

            <aside class="w-1/3 max-w-sm bg-white p-6 border-l border-gray-200 overflow-y-auto shadow-inner flex flex-col">

    <!-- ════════════════════════════════════════
         VANILLA JS – BEFINTLIG LOGIK
    ════════════════════════════════════════ -->
    <script>
        // ── Supabase ──
        const SUPABASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impud2F0Ym5rZHp1eWhxbWNlcmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczNDcsImV4cCI6MjA4ODA1MzM0N30._A6BCYepTsITJNYgJBUPb79TDR3ln45DPvbmy8Igyoo';
        const BUCKET_NAME = 'intranet-dokument';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── UI-element ──
        const loginScreen    = document.getElementById('login-screen');
        const intranetScreen = document.getElementById('intranet-screen');
        const loginForm      = document.getElementById('login-form');
        const errorMsg       = document.getElementById('error-message');
        const logoutBtn      = document.getElementById('logout-btn');
        const documentList   = document.getElementById('document-list');
        const searchInput    = document.getElementById('search-input');
        const fileUpload     = document.getElementById('file-upload');
        const uploadBtn      = document.getElementById('upload-btn');
        const uploadStatus   = document.getElementById('upload-status');

        // ── Flikbyte ──
        let quizMounted = false;
        function switchTab(tab) {
            const tabs    = ['elvis', 'kretskampen'];
            const tabBtns = { elvis: document.getElementById('tab-elvis'), kretskampen: document.getElementById('tab-kretskampen') };
            const contents = { elvis: document.getElementById('content-elvis'), kretskampen: document.getElementById('content-kretskampen') };

            tabs.forEach(t => {
                tabBtns[t].classList.toggle('active', t === tab);
                tabBtns[t].classList.toggle('tab-inactive', t !== tab);
                contents[t].classList.toggle('hidden', t !== tab);
            });

            // Montera React-quizet första gången fliken öppnas
            if (tab === 'kretskampen' && !quizMounted) {
                quizMounted = true;
                const container = document.getElementById('quiz-root');
                const root = ReactDOM.createRoot(container);
                root.render(React.createElement(window.KretskampenApp));
            }
        }

        // ── Dokument-hantering ──
        async function loadDocuments() {
            documentList.innerHTML = '<li class="text-sm text-gray-500 py-2">Hämtar filer från Supabase...</li>';
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list();
            if (error) {
                documentList.innerHTML = '<li class="text-sm text-red-500 py-2">Kunde inte hämta dokument.</li>';
                return;
            }
            documentList.innerHTML = '';
            if (!data || data.length === 0) {
                documentList.innerHTML = '<li class="text-sm text-gray-400 py-2">Inga dokument uppladdade ännu.</li>';
                return;
            }
            data.forEach(file => {
                if (file.name === '.emptyFolderPlaceholder') return;
                const { data: publicUrlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(file.name);
                const li = document.createElement('li');
                li.className = 'doc-item';
                li.innerHTML = `
                    <a class="flex items-center p-3 rounded-lg hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-all text-gray-700 hover:text-[#06B4E4] group cursor-pointer">
                        <svg class="w-5 h-5 mr-3 text-gray-400 group-hover:text-[#06B4E4] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <span class="font-medium text-sm truncate">${file.name}</span>
                    </a>`;
                li.querySelector('a').addEventListener('click', async () => {
                    const fileUrl = publicUrlData.publicUrl;
                    if (file.name.endsWith('.html')) {
                        const response = await fetch(fileUrl);
                        const html = await response.text();
                        const blob = new Blob([html], { type: 'text/html' });
                        window.open(URL.createObjectURL(blob), '_blank');
                    } else {
                        window.open(fileUrl, '_blank');
                    }
                });
                documentList.appendChild(li);
            });
        }

        uploadBtn.addEventListener('click', async () => {
            const file = fileUpload.files[0];
            if (!file) { showUploadStatus('Välj en fil först!', 'text-red-500'); return; }
            showUploadStatus('Laddar upp...', 'text-[#06B4E4]');
            uploadBtn.disabled = true;
            const contentType = file.name.endsWith('.html') ? 'text/html' : file.type;
            const { error } = await supabaseClient.storage.from(BUCKET_NAME).upload(file.name, file, { cacheControl: '3600', upsert: true, contentType });
            uploadBtn.disabled = false;
            if (error) { showUploadStatus('Fel: ' + error.message, 'text-red-500'); }
            else {
                showUploadStatus('Uppladdning lyckades!', 'text-green-500');
                fileUpload.value = '';
                loadDocuments();
                setTimeout(() => uploadStatus.classList.add('hidden'), 3000);
            }
        });

        function showUploadStatus(msg, colorClass) {
            uploadStatus.textContent = msg;
            uploadStatus.className = `text-xs mt-2 block ${colorClass}`;
        }

        searchInput.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.doc-item').forEach(item => {
                item.style.display = item.textContent.toLowerCase().includes(term) ? 'block' : 'none';
            });
        });

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showIntranet();
        }
        checkSession();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });
            if (error) {
                errorMsg.textContent = 'Fel e-post eller lösenord. Försök igen.';
                errorMsg.classList.remove('hidden');
            } else { showIntranet(); }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            loginScreen.classList.remove('hidden');
            intranetScreen.classList.add('hidden');
            document.getElementById('password').value = '';
        });

        function showIntranet() {
            loginScreen.classList.add('hidden');
            intranetScreen.classList.remove('hidden');
            loadDocuments();
        }
    </script>


    <!-- ════════════════════════════════════════

    <script type="text/babel" data-presets="react">

        // ╔══════════════════════════════════╗
        // ║  🔑  KONFIGURATION               ║
        // ║  Ersätt med din Anthropic-nyckel ║
        // ╚══════════════════════════════════╝

                        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={6}

                                borderLeft:`4px solid ${selected === q.correct ? '#16A34A' : '#DC2626'}`,
                            }}>
                                <div style={{ fontWeight:700, color: selected === q.correct ? '#16A34A' : '#DC2626', marginBottom:6, fontSize:14, display:'flex', alignItems:'center', gap:8 }}>
                                    {selected === q.correct ? '✓ Rätt!' : selected === -1 ? '⏱ Tiden tog slut!' : '✗ Fel svar'}
                                    {selected === q.correct && (
                                        <span style={{ color:'#6B7280', fontWeight:600, fontSize:13 }}>
                                            +{history[history.length-1]?.gained} poäng
                                        </span>
                                    )}
                                </div>
                                <div style={{ fontSize:13, color:'#374151', lineHeight:1.55 }}>{q.explanation}</div>
                                <button className="kk-primary-btn" onClick={handleNext} style={{ marginTop:14, padding:'12px 0' }}>
                                    {isLast ? '🏁 Se resultat' : 'Nästa fråga →'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ──────────────────────────────────────
        // ResultScreen
        // ──────────────────────────────────────
        function ResultScreen({ playerName, score, totalQ, sessionScores, onHome, onLeaderboard }) {
            const correct  = sessionScores.filter(s => s.correct).length;
            const pct      = Math.round((correct / totalQ) * 100);
            const avgTime  = sessionScores.filter(s => s.correct).length > 0
                ? Math.round(sessionScores.filter(s=>s.correct).reduce((a,b)=>a+b.timeLeft,0) / correct)
                : 0;

            let medal = '🥉', msg = 'Bra försök! Fortsätt träna!';
            if (pct >= 90) { medal = '🥇'; msg = 'Otroligt bra! Du är expert!'; }
            else if (pct >= 70) { medal = '🥈'; msg = 'Imponerande! Riktigt bra!'; }
            else if (pct >= 50) { medal = '🥉'; msg = 'Godkänt! Du kan mer!'; }

            return (
                <div className="kk-home-bg">
                    <div className="kk-card" style={{ maxWidth:460 }}>
                        <div style={{ textAlign:'center', marginBottom:24 }}>
                            <div style={{ fontSize:60, marginBottom:8, animation:'kk-pop 0.5s ease' }}>{medal}</div>
                            <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontSize:26, fontWeight:800, color:'#111827' }}>{msg}</div>
                            <div style={{ color:'#6B7280', fontSize:14, marginTop:4 }}>{playerName}</div>
                        </div>

                        <div style={{
                            background:'linear-gradient(135deg, #06B4E4 0%, #0369A1 100%)',
                            borderRadius:16, padding:'24px', textAlign:'center', color:'white', marginBottom:20,
                        }}>
                            <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontSize:52, fontWeight:900, lineHeight:1 }}>
                                {score.toLocaleString('sv-SE')}
                            </div>
                            <div style={{ opacity:0.8, fontSize:14, marginTop:4 }}>poäng</div>
                        </div>

                        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:24 }}>
                            {[
                                { label:'Rätt svar',    value:`${correct}/${totalQ}`, color:'#16A34A' },
                                { label:'Precision',    value:`${pct}%`,              color:'#06B4E4' },
                                { label:'Snittid kvar', value:`${avgTime}s`,          color:'#F59E0B' },
                            ].map(stat => (
                                <div key={stat.label} style={{
                                    background:'white', borderRadius:12, padding:'14px 8px',
                                    textAlign:'center', boxShadow:'0 2px 8px rgba(0,0,0,0.07)',
                                }}>
                                    <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontSize:22, fontWeight:800, color:stat.color }}>{stat.value}</div>
                                    <div style={{ fontSize:11, color:'#9CA3AF', marginTop:2 }}>{stat.label}</div>
                                </div>
                            ))}
                        </div>

                        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                            <button className="kk-primary-btn" onClick={onLeaderboard}>🏆 Highscore-tavlan</button>
                            <button className="kk-ghost-btn" style={{ width:'100%' }} onClick={onHome}>← Spela igen</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ──────────────────────────────────────
        // LeaderboardScreen
        // ──────────────────────────────────────
        function LeaderboardScreen({ onBack, currentPlayer, currentScore }) {
            const [scores,  setScores]  = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            React.useEffect(() => {
                loadScores().then(data => { setScores(data); setLoading(false); });
            }, []);

            const medals = ['🥇','🥈','🥉'];
            return (
                <div style={{ display:'flex', flexDirection:'column', minHeight:'100%' }}>
                    <div style={{
                        background:'linear-gradient(135deg, #06B4E4 0%, #0369A1 100%)',
                        padding:'20px 20px 24px',
                    }}>
                        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
                            <button onClick={onBack} style={{ background:'rgba(255,255,255,0.2)', border:'none', color:'white', fontSize:18, cursor:'pointer', borderRadius:8, padding:'4px 12px' }}>←</button>
                            <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontWeight:900, fontSize:11, color:'rgba(255,255,255,0.7)', letterSpacing:2, textTransform:'uppercase' }}>⚡ KRETSKAMPEN</div>
                        </div>
                        <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontSize:30, fontWeight:900, color:'white' }}>🏆 Highscore-tavlan</div>
                        <div style={{ color:'rgba(255,255,255,0.7)', fontSize:13 }}>Topp 50 spelare</div>
                    </div>

                    <div style={{ flex:1, overflow:'auto', padding:16, background:'#F8FAFC', display:'flex', flexDirection:'column', gap:8 }}>
                        {loading ? (
                            <div style={{ textAlign:'center', color:'#9CA3AF', paddingTop:60 }}>
                                <div style={{ display:'flex', gap:8, justifyContent:'center', marginBottom:16 }}>
                                    <div className="kk-dot"/><div className="kk-dot"/><div className="kk-dot"/>
                                </div>
                                <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontSize:16, fontWeight:600 }}>Hämtar highscores...</div>
                            </div>
                        ) : scores.length === 0 ? (
                            <div style={{ textAlign:'center', color:'#9CA3AF', paddingTop:60 }}>
                                <div style={{ fontSize:48, marginBottom:12 }}>🎯</div>
                                <div style={{ fontFamily:"'Barlow Condensed', sans-serif", fontSize:20, fontWeight:700 }}>Inga resultat ännu</div>
                                <div style={{ fontSize:14 }}>Bli den första att spela!</div>
                            </div>
                        ) : scores.map((s, i) => {
                            // Supabase returnerar snake_case – hantera båda formaten
                            const playedAt = s.played_at || s.date;
                            const isMe = s.name === currentPlayer && s.score === currentScore;
                            return (
                                <div key={i} className="kk-score-row" style={isMe ? {
                                    background:'linear-gradient(135deg, #06B4E4 0%, #0369A1 100%)',
                                    boxShadow:'0 6px 20px rgba(6,180,228,0.3)',
                                } : {}}>
                                    <div style={{
                                        fontFamily:"'Barlow Condensed', sans-serif", fontSize:20, fontWeight:900,
                                        color: isMe ? 'rgba(255,255,255,0.9)' : '#D1D5DB', minWidth:30, textAlign:'center',
                                    }}>
                                        {i < 3 ? medals[i] : `#${i+1}`}
                                    </div>
                                    <div style={{ flex:1 }}>
                                        <div style={{ fontWeight:700, fontSize:14, color: isMe ? 'white' : '#111827' }}>
                                            {s.name}{isMe ? ' (du)' : ''}
                                        </div>
                                        <div style={{ fontSize:12, color: isMe ? 'rgba(255,255,255,0.65)' : '#9CA3AF' }}>
                                            {s.correct}/{s.total} rätt · {fmtDate(playedAt)}
                                        </div>
                                    </div>
                                    <div style={{
                                        fontFamily:"'Barlow Condensed', sans-serif", fontSize:22, fontWeight:900,
                                        color: isMe ? 'white' : '#06B4E4',
                                    }}>{s.score.toLocaleString('sv-SE')}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ──────────────────────────────────────
        // Huvud-app
        // ──────────────────────────────────────
        function KretskampenApp() {
            const [screen,        setScreen]        = React.useState('home');
            const [playerName,    setPlayerName]    = React.useState('');
            const [category,      setCategory]      = React.useState('all');
            const [qCount,        setQCount]        = React.useState(10);
            const [questions,     setQuestions]     = React.useState([]);
            const [finalScore,    setFinalScore]    = React.useState(0);
            const [sessionScores, setSessionScores] = React.useState([]);
            const [error,         setError]         = React.useState(null);

            const handleStart = async (name, cat, count) => {
                setPlayerName(name); setCategory(cat); setQCount(count);
                setScreen('loading'); setError(null);
                try {
                    const qs = await generateQuestions(cat, count);
                    setQuestions(qs); setScreen('quiz');
                } catch(e) {
                    setError('Kunde inte generera frågor: ' + e.message);
                    setScreen('home');
                }
            };

            const handleFinish = async (score, sScores) => {
                const correct = sScores.filter(s => s.correct).length;
                setFinalScore(score); setSessionScores(sScores);
                await saveScore({ name:playerName, score, correct, total:questions.length, category, date:new Date().toISOString() });
                setScreen('result');
            };

            return (
                <div style={{ minHeight:'100%', fontFamily:"'Barlow', sans-serif" }}>
                    {error && (
                        <div style={{ background:'#FEF2F2', color:'#991B1B', padding:'12px 16px', fontSize:13, textAlign:'center', borderBottom:'1px solid #FECACA' }}>
                            ⚠️ {error}
                        </div>
                    )}
                    {screen === 'home'         && <HomeScreen onStart={handleStart} onLeaderboard={() => setScreen('leaderboard')}/>}
                    {screen === 'loading'      && <LoadingScreen category={category} count={qCount}/>}
                    {screen === 'quiz'         && <QuizScreen questions={questions} playerName={playerName} onFinish={handleFinish}/>}
                    {screen === 'result'       && <ResultScreen playerName={playerName} score={finalScore} totalQ={questions.length} sessionScores={sessionScores} onHome={() => setScreen('home')} onLeaderboard={() => setScreen('leaderboard')}/>}
                    {screen === 'leaderboard'  && <LeaderboardScreen onBack={() => setScreen(finalScore ? 'result' : 'home')} currentPlayer={playerName} currentScore={finalScore}/>}
                </div>
            );
        }

        // Exponera för vanilla JS
        window.KretskampenApp = KretskampenApp;

    </script>
</body>
</html>
