            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-radius: 16px; background: white;
            border: 1px solid #F1F5F9; transition: all 0.2s;

        .kk-rank-silver { background: #F1F5F9; border-color: #CBD5E1; }
        .kk-rank-bronze { background: #FFEDD5; border-color: #FED7AA; }

        .kk-cat-btn:hover:not(.selected) { border-color: var(--primary); color: var(--primary); background: white; }

        @keyframes kk-pop { 0%{transform:scale(0.85)} 60%{transform:scale(1.08)} 100%{transform:scale(1)} }

</head>

    <script>
        const SUPABASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impud2F0Ym5rZHp1eWhxbWNlcmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczNDcsImV4cCI6MjA4ODA1MzM0N30._A6BCYepTsITJNYgJBUPb79TDR3ln45DPvbmy8Igyoo';
        const BUCKET_NAME = 'intranet-dokument';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function setTheme(themeName) {
            document.body.setAttribute('data-theme', themeName);
            localStorage.setItem('user-theme', themeName);
            const uploadBtn = document.getElementById('upload-btn');
            if(uploadBtn) {
                const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
                uploadBtn.style.borderColor = primaryColor;
                uploadBtn.style.color = primaryColor;
            }
        }
        setTheme(localStorage.getItem('user-theme') || 'default');

        const loginScreen = document.getElementById('login-screen');
        const intranetScreen = document.getElementById('intranet-screen');
        const errorMsg = document.getElementById('error-message');
        const documentList = document.getElementById('document-list');
        const searchInput = document.getElementById('search-input');
        const fileUpload = document.getElementById('file-upload');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showIntranet();
        }
        checkSession();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });
            if (error) { errorMsg.textContent = 'Fel e-post eller lösenord'; errorMsg.classList.remove('hidden'); }
            else { showIntranet(); }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            location.reload();
        });

        function showIntranet() {
            loginScreen.classList.add('hidden');
            intranetScreen.classList.remove('hidden');
            loadDocuments();
        }

        let quizMounted = false;
        function switchTab(tab) {
            const contents = { elvis: document.getElementById('content-elvis'), kretskampen: document.getElementById('content-kretskampen') };
            const tabs = { elvis: document.getElementById('tab-elvis'), kretskampen: document.getElementById('tab-kretskampen') };
            Object.keys(contents).forEach(k => {
                contents[k].classList.toggle('hidden', k !== tab);
                tabs[k].classList.toggle('active', k === tab);
            });
            if (tab === 'kretskampen' && !quizMounted) {
                quizMounted = true;
                ReactDOM.createRoot(document.getElementById('quiz-root')).render(React.createElement(window.KretskampenApp));
            }
        }

        // ── Smart funktion för snygga fil-ikoner (Inklusive HTML!) ──
        function getFileIconHTML(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            let bg = 'bg-gray-100'; let text = 'text-gray-500';
            let icon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>`;

            if (ext === 'pdf') { 
                bg = 'bg-red-50'; text = 'text-red-500';
            } else if (['xls', 'xlsx', 'csv'].includes(ext)) { 
                bg = 'bg-green-50'; text = 'text-green-500';
                icon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>`;
            } else if (['doc', 'docx'].includes(ext)) { 
                bg = 'bg-blue-50'; text = 'text-blue-500';
            } else if (['png', 'jpg', 'jpeg', 'gif', 'svg'].includes(ext)) { 
                bg = 'bg-purple-50'; text = 'text-purple-500';
                icon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>`;
            } else if (['html', 'htm'].includes(ext)) { 
                bg = 'bg-orange-50'; text = 'text-orange-500';
                icon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>`;
            }

            return `<div class="w-10 h-10 rounded-xl ${bg} ${text} flex items-center justify-center flex-shrink-0 shadow-sm border border-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icon}</svg>
            </div>`;
        }

        async function loadDocuments() {
            if(!documentList) return;
            documentList.innerHTML = '<li class="text-sm text-gray-500 py-10 text-center font-bold animate-pulse">Hämtar dokument...</li>';
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list();
            if (error) { documentList.innerHTML = '<li class="text-sm text-red-500 py-10 text-center">Kunde inte hämta dokument.</li>'; return; }
            documentList.innerHTML = '';
            if (!data || data.length === 0) { documentList.innerHTML = '<li class="text-sm text-gray-400 py-10 text-center">Inga dokument uppladdade ännu.</li>'; return; }
            
            data.forEach(file => {
                if (file.name === '.emptyFolderPlaceholder') return;
                const { data: publicUrlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(file.name);
                const li = document.createElement('li');
                li.className = 'doc-item';
                
                li.innerHTML = `
                    <a class="flex items-center p-3 bg-white rounded-2xl border border-gray-100 hover:border-[var(--primary)] hover:shadow-md transition-all cursor-pointer group relative overflow-hidden">
                        ${getFileIconHTML(file.name)}
                        <div class="flex-1 min-w-0 ml-3">
                            <p class="font-bold text-sm truncate text-gray-800 group-hover:text-[var(--primary)] transition-colors">${file.name}</p>
                            <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mt-0.5">Läs dokument</p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-[var(--primary)] group-hover:text-white transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </a>`;
                    
                li.querySelector('a').addEventListener('click', async () => {
                    const fileUrl = publicUrlData.publicUrl;
                    if (file.name.endsWith('.html')) {
                        const response = await fetch(fileUrl);
                        const html = await response.text();
                        const blob = new Blob([html], { type: 'text/html' });
                        window.open(URL.createObjectURL(blob), '_blank');
                    } else {
                        window.open(fileUrl, '_blank');
                    }
                });
                documentList.appendChild(li);
            });
        }

        if(uploadBtn) {
            uploadBtn.addEventListener('click', async () => {
                const file = fileUpload.files[0];
                if (!file) { showUploadStatus('Välj en fil först!', 'text-red-500'); return; }
                showUploadStatus('Laddar upp...', 'text-gray-500');
                uploadBtn.disabled = true;
                const contentType = file.name.endsWith('.html') ? 'text/html' : file.type;
                const { error } = await supabaseClient.storage.from(BUCKET_NAME).upload(file.name, file, { cacheControl: '3600', upsert: true, contentType });
                uploadBtn.disabled = false;
                if (error) { showUploadStatus('Fel: ' + error.message, 'text-red-500'); }
                else {
                    showUploadStatus('Uppladdning lyckades!', 'text-green-500');
                    fileUpload.value = '';
                    loadDocuments();
                    setTimeout(() => uploadStatus.classList.add('hidden'), 3000);
                }
            });
        }

        function showUploadStatus(msg, colorClass) {
            if(uploadStatus) {
                uploadStatus.textContent = msg;
                uploadStatus.className = `text-xs mt-2 block ${colorClass}`;
                uploadStatus.classList.remove('hidden');
            }
        }

        if(searchInput) {
            searchInput.addEventListener('input', function(e) {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.doc-item').forEach(item => {
                    item.style.display = item.textContent.toLowerCase().includes(term) ? 'block' : 'none';
                });
            });
        }

    </script>

    <!-- REACT / JSX – KRETSKAMPEN -->
    <script type="text/babel" data-presets="react">
        const KNOWLEDGE_BASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co/storage/v1/object/sign/Quiz%20dokument/Elkretsen_Kunskapsbas_Samlad_Quiz.txt?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9hMDg2ZWVkMy1mZDdhLTQ0NWYtOTY5OS1iMDViNDE1NDI5MzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJRdWl6IGRva3VtZW50L0Vsa3JldHNlbl9LdW5za2Fwc2Jhc19TYW1sYWRfUXVpei50eHQiLCJpYXQiOjE3NzI2NTI2NzYsImV4cCI6NDkyNjI1MjY3Nn0.3zkcFjaJmwLPFEoWa9sJx15eq2xil9NiteRPb76mtKQ';
        
        async function getKnowledgeBase() {
            const response = await fetch(KNOWLEDGE_BASE_URL);
            return await response.text();
        }

        const CATEGORIES = [
            { id: 'all', label: 'Alla kategorier', emoji: '⚡' },
            { id: 'C', label: 'EU & Reglering', emoji: '🇪🇺' },
            { id: 'A', label: 'Ekonomi', emoji: '💰' },
            { id: 'B', label: 'Teknik', emoji: '🔧' },
            { id: 'D', label: 'Juridik', emoji: '⚖️' },
        ];

        const ANSWER_COLORS  = ['#EF4444','#3B82F6','#22C55E','#F59E0B'];
        const ANSWER_ICONS   = ['▲','◆','●','✦'];
        const TIME_PER_Q     = 20;

        async function loadScores() {
            const { data } = await supabaseClient.from('kretskampen_scores').select('*').order('score', {ascending:false}).limit(20);
            return data || [];
        }

        async function generateQuestions(category, count) {
            const kb = await getKnowledgeBase();
            const seed = new Date().getTime();
            const catLabel = category === 'all' ? 'alla kategorier' : CATEGORIES.find(c => c.id === category)?.label;
            const prompt = `SESSION: ${seed}. Skapa ${count} flervalsfrågor på SVENSKA om: ${catLabel}. Plocka frågor från HELA dokumentet, sprid ut dem! Kunskapsbas: ${kb}. Svara i JSON: { "questions": [ { "question": "Text?", "answers": ["A","B","C","D"], "correct": 0, "explanation": "Varför?" } ] }`;
            
            const res = await fetch('https://jnwatbnkdzuyhqmcerej.supabase.co/functions/v1/smooth-action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
            return JSON.parse(text.replace(/```json|```/g, '').trim()).questions;
        }

        function calcScore(timeLeft, correct) {
            return correct ? Math.round(500 + (timeLeft / TIME_PER_Q) * 500) : 0;
        }

        // Tydlig mörk text i timern
        function TimerRing({ timeLeft, total }) {
            const r = 34, cx = 42, cy = 42, circ = 2 * Math.PI * r;
            const offset = circ * (1 - timeLeft / total);
            const color = timeLeft > 10 ? 'var(--primary)' : timeLeft > 5 ? '#F59E0B' : '#EF4444';
            return (
                <div style={{ position:'relative', width:84, height:84 }}>
                    <svg width="84" height="84" style={{ transform:'rotate(-90deg)' }}>
                        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E5E7EB" strokeWidth={6}/>
                        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={6} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{ transition:'stroke-dashoffset 1s linear' }}/>
                    </svg>
                    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:26, fontWeight:900, color:"#111827", fontFamily:"'Barlow Condensed'" }}>{timeLeft}</div>
                </div>
            );
        }

        /* ── REACT COMPONENTS ── */
        function KretskampenApp() {
            const [screen, setScreen] = React.useState('home');
            const [questions, setQuestions] = React.useState([]);
            const [player, setPlayer] = React.useState('');
            const [score, setScore] = React.useState(0);
            const [category, setCategory] = React.useState('all');

            const startQuiz = async (name, cat, count) => {
                setPlayer(name); setCategory(cat); setScreen('loading');
                try {
                    const qs = await generateQuestions(cat, count);
                    setQuestions(qs); setScreen('quiz');
                } catch(e) { alert('Fel vid AI-generering: ' + e.message); setScreen('home'); }
            };

            const finishQuiz = async (finalScore, hist) => {
                setScore(finalScore); setScreen('result');
                const correctCount = hist.filter(h => h.correct).length;
                await supabaseClient.from('kretskampen_scores').insert([{ name:player, score:finalScore, correct:correctCount, total:questions.length, category:category, played_at:new Date().toISOString() }]);
            };

            if (screen === 'home') return (
                <div className="flex flex-col items-center py-12 px-4 h-full relative z-10">
                    <div className="kk-card bg-white/90 backdrop-blur-xl border border-white/50">
                        <div className="text-center mb-8">
                            <h2 className="text-5xl font-black font-barlow-condensed italic uppercase drop-shadow-sm" style={{color: 'var(--primary)'}}>⚡ Kretskampen</h2>
                            <p class="text-gray-600 font-medium">Utmana kollegorna i El-kretsens stora kunskapskamp!</p>
                        </div>
                        <div class="mb-6">
                            <label class="kk-label">Ditt Namn</label>
                            <input class="kk-input" value={player} onChange={e=>setPlayer(e.target.value)} placeholder="T.ex. Magnus..." maxLength="20" />
                        </div>
                        <div class="mb-6">
                            <label class="kk-label">Kategori</label>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                {CATEGORIES.map(cat => <button key={cat.id} className={`kk-cat-btn ${category === cat.id ? 'selected' : ''}`} onClick={() => setCategory(cat.id)} style={{marginBottom:0}}>{cat.emoji} {cat.label}</button>)}
                            </div>
                        </div>
                        <button class="kk-primary-btn mb-4 text-xl py-4 shadow-xl text-white" disabled={!player.trim()} onClick={()=>startQuiz(player, category, 10)}>Starta Kampen 🚀</button>
                        <button onClick={()=>setScreen('leaderboard')} class="w-full text-sm font-bold uppercase text-gray-500 hover:text-gray-800 transition-colors py-2">Visa Highscore 🏆</button>
                    </div>
                </div>
            );

            if (screen === 'loading') return (
                <div className="flex flex-col items-center justify-center py-20 relative z-10">
                    <div className="bg-white/90 backdrop-blur-xl border border-white/50 p-10 rounded-3xl shadow-2xl text-center max-w-sm w-full">
                        <div className="kk-dot h-4 w-4 mb-6"></div>
                        <div className="kk-dot h-4 w-4 mb-6 mx-2" style={{animationDelay: '0.2s'}}></div>
                        <div className="kk-dot h-4 w-4 mb-6" style={{animationDelay: '0.4s'}}></div>
                        <p class="font-black italic uppercase tracking-widest text-xl" style={{color: 'var(--primary)'}}>AI laddar dokumentet...</p>
                        <p className="text-gray-500 font-medium text-sm mt-2">Letar upp kluriga frågor åt {player}</p>
                    </div>
                </div>
            );

            if (screen === 'quiz') return (
                <div className="relative z-10 py-6 px-4 flex-1 overflow-auto flex flex-col items-center">
                    <QuizWindow questions={questions} player={player} onFinish={finishQuiz} />
                </div>
            );

            if (screen === 'result') return (
                <div className="flex flex-col items-center py-12 relative z-10">
                    <div className="kk-card text-center bg-white/90 backdrop-blur-xl border border-white/50">
                        <div class="text-7xl mb-4 drop-shadow-md" style={{animation: 'kk-pop 0.5s ease'}}>🏆</div>
                        <h2 class="text-3xl font-bold mb-2 text-gray-800">Snyggt jobbat, {player}!</h2>
                        <div class="p-8 rounded-3xl my-8 shadow-inner border border-gray-100 bg-gray-50">
                            <div class="text-sm uppercase font-black mb-1 text-gray-500">Din Slutpoäng</div>
                            <div class="text-6xl font-black font-barlow-condensed drop-shadow-sm" style={{color: 'var(--primary)'}}>{score.toLocaleString()}</div>
                        </div>
                        <button class="kk-primary-btn mb-4 py-4 text-lg shadow-xl text-white" onClick={()=>setScreen('leaderboard')}>Se var du hamnade 🏅</button>
                        <button class="kk-ghost-btn w-full" onClick={()=>setScreen('home')}>Spela igen</button>
                    </div>
                </div>
            );

            if (screen === 'leaderboard') return <div className="relative z-10 py-8 h-full"><Leaderboard onBack={()=>setScreen(score > 0 ? 'result' : 'home')} player={player} score={score} /></div>;
        }

        // Tydliga och svarta texter i hela QuizWindow
        function QuizWindow({ questions, player, onFinish }) {
            const [idx, setIdx] = React.useState(0);
            const [score, setScore] = React.useState(0);
            const [selected, setSelected] = React.useState(null);
            const [history, setHistory] = React.useState([]);
            const [timeLeft, setTimeLeft] = React.useState(TIME_PER_Q);
            const timerRef = React.useRef();
            const q = questions[idx];

            const handleAns = (i) => {
                if (selected !== null) return;
                clearInterval(timerRef.current);
                setSelected(i);
                const correct = i === q.correct;
                const gained = calcScore(timeLeft, correct);
                setScore(s => s + gained);
                setHistory(h => [...h, { gained, correct, timeLeft }]);
            };

            React.useEffect(() => {
                setSelected(null); setTimeLeft(TIME_PER_Q);
                timerRef.current = setInterval(() => {
                    setTimeLeft(t => { if(t <= 1){ clearInterval(timerRef.current); handleAns(-1); return 0; } return t - 1; });
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, [idx]);

            return (
                <div className="w-full max-w-2xl bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/50 flex flex-col">
                    
                    <div className="bg-white p-5 sm:p-6 border-b border-gray-100 flex justify-between items-center z-10 shadow-sm">
                        <div>
                            <div class="text-[12px] uppercase font-bold text-gray-400 tracking-wider font-barlow-condensed">Fråga {idx+1}/{questions.length}</div>
                            <div class="text-xl font-bold font-barlow-condensed text-gray-900">{player}</div>
                        </div>
                        <TimerRing timeLeft={timeLeft} total={TIME_PER_Q} />
                        <div class="text-right">
                            <div class="text-[12px] uppercase font-bold text-gray-400 tracking-wider font-barlow-condensed">Poäng</div>
                            <div class="text-3xl font-black font-barlow-condensed text-gray-900">{score.toLocaleString()}</div>
                        </div>
                    </div>
                    
                    <div class="p-6 sm:p-8 flex-1 bg-gray-50/50">
                        <h3 class="text-xl sm:text-2xl font-bold mb-8 text-center leading-relaxed text-gray-900">{q.question}</h3>
                        <div class="grid sm:grid-cols-2 gap-4 mb-6">
                            {q.answers.map((a, i) => {
                                let btnStyle = { background: 'white', color: '#1F2937', border: '2px solid #E5E7EB' };
                                if (selected !== null) {
                                    if (i === q.correct) btnStyle = { background: '#10B981', color: 'white', border: '2px solid #059669', transform: 'scale(1.02)' };
                                    else if (i === selected) btnStyle = { background: '#EF4444', color: 'white', border: '2px solid #B91C1C', opacity: 0.9 };
                                    else btnStyle = { background: 'white', color: '#9CA3AF', border: '2px solid #F3F4F6', opacity: 0.5 };
                                }
                                return (
                                    <button key={i} onClick={()=>handleAns(i)} disabled={selected !== null} className="flex flex-col p-5 rounded-2xl transition-all duration-200 hover:border-[var(--primary)] shadow-sm text-left" style={btnStyle}>
                                        <div style={{ fontSize:26, marginBottom:8, opacity:0.9 }}>{ANSWER_ICONS[i]}</div>
                                        <div style={{ fontSize:16, fontWeight:700, lineHeight:1.4 }}>{a}</div>
                                    </button>
                                )
                            })}
                        </div>
                        {selected !== null && (
                            <div class="kk-fadein rounded-2xl border-l-4 overflow-hidden shadow-lg bg-white mt-8" style={{ borderColor: selected === q.correct ? '#10B981' : '#EF4444' }}>
                                <div className="p-5" style={{ background: selected === q.correct ? '#ECFDF5' : '#FEF2F2' }}>
                                    <div className="flex justify-between items-center mb-2">
                                        <div style={{ fontWeight:800, fontSize:18, color: selected === q.correct ? '#059669' : '#B91C1C' }}>
                                            {selected === q.correct ? '🎉 Rätt svar!' : selected === -1 ? '⏱ Tiden var ute!' : '❌ Tyvärr fel'}
                                        </div>
                                        {selected === q.correct && <div className="font-black text-green-800 bg-green-200 px-3 py-1.5 rounded-full text-sm shadow-sm">+{history[history.length-1]?.gained} p</div>}
                                    </div>
                                    <div class="text-gray-800 leading-relaxed font-medium text-sm sm:text-base">{q.explanation}</div>
                                </div>
                                <div className="p-4 bg-gray-50 border-t border-gray-200">
                                    <button class="kk-primary-btn py-3 shadow-md text-white" onClick={()=>{ if(idx < questions.length-1){ setIdx(idx+1); } else { onFinish(score, history); }}}>{idx < questions.length-1 ? 'Nästa fråga →' : 'Se Resultat 🏆'}</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function Leaderboard({ onBack, player, score }) {
            const [list, setList] = React.useState([]);
            React.useEffect(() => {
                supabaseClient.from('kretskampen_scores').select('*').order('score', {ascending:false}).limit(50)
                .then(({data})=>setList(data || []));
            }, []);

            return (
                <div className="flex flex-col items-center px-4 h-full">
                    <div className="w-full max-w-2xl bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/50 flex flex-col h-full max-h-[850px]">
                        <div className="bg-header p-6 sm:p-8 text-white text-center relative shadow-lg z-10">
                            <button onClick={onBack} class="absolute left-6 top-1/2 -translate-y-1/2 font-bold text-sm uppercase opacity-90 hover:opacity-100 bg-black/20 px-3 py-2 rounded-xl transition-all shadow-inner border border-white/10 text-white">← Tillbaka</button>
                            <h2 class="text-4xl sm:text-5xl font-black font-barlow-condensed italic uppercase tracking-wider drop-shadow-md text-white">Hjältar 🏅</h2>
                            <p className="text-sm sm:text-base font-bold opacity-80 mt-2 tracking-widest uppercase text-white">Topp 50 hos El-kretsen</p>
                        </div>
                        <div class="flex-1 overflow-y-auto p-4 sm:p-8 bg-gray-50/50 space-y-3">
                            {list.length === 0 ? <div className="text-center py-20 text-gray-500 font-bold text-lg animate-pulse">Laddar resultat...</div> : 
                            list.map((s, i) => {
                                const isMe = s.name === player && s.score === score && score > 0;
                                const rankClass = i === 0 ? 'kk-rank-gold shadow-md' : i === 1 ? 'kk-rank-silver shadow-md' : i === 2 ? 'kk-rank-bronze shadow-md' : 'shadow-sm';
                                const catEmoji = CATEGORIES.find(c => c.id === s.category)?.emoji || '⚡';
                                return (
                                    <div key={i} class={`kk-score-row ${rankClass}`} style={isMe ? { borderColor: 'var(--primary)', borderWidth: '2px', boxShadow: '0 8px 25px rgba(0,0,0,0.1)', transform:'scale(1.02)' } : {}}>
                                        <div class="text-3xl font-black font-barlow-condensed italic w-12 text-center" style={{color: i<3 ? '#475569' : '#94A3B8'}}>
                                            {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
                                        </div>
                                        <div class="flex-1 ml-2">
                                            <div class="font-black text-gray-800 text-lg flex items-center gap-2">
                                                {s.name} 
                                                {isMe && <span className="bg-primary text-white text-[10px] px-2.5 py-0.5 rounded-full font-black uppercase tracking-wider hidden sm:inline-block shadow-sm">Det är du!</span>}
                                            </div>
                                            <div class="text-xs font-bold text-gray-500 mt-1 uppercase tracking-wider">{catEmoji} {s.correct}/{s.total} rätt <span className="mx-1 opacity-50">•</span> {new Date(s.played_at).toLocaleDateString('sv-SE', {day:'numeric', month:'short'})}</div>
                                        </div>
                                        <div class="text-3xl font-black font-barlow-condensed italic drop-shadow-sm" style={{color: 'var(--primary)'}}>{s.score.toLocaleString()}</div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        window.KretskampenApp = KretskampenApp;
    </script>
</body>
</html>
