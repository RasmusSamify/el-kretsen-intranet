<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-kretsen Intranät</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script async type='module' src='https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js'></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="text-gray-800 font-sans h-screen flex flex-col bg-app-container overflow-hidden" data-theme="default">

    <!-- ── LOGIN ── -->
    <div id="login-screen" class="flex flex-col items-center justify-center h-full content-relative">
        <div class="kk-card text-center bg-white/90 backdrop-blur-xl border border-white/50">
            <img src="https://jnwatbnkdzuyhqmcerej.supabase.co/storage/v1/object/sign/Logotyper/Untitled%20folder/logo_large.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9hMDg2ZWVkMy1mZDdhLTQ0NWYtOTY5OS1iMDViNDE1NDI5MzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb2dvdHlwZXIvVW50aXRsZWQgZm9sZGVyL2xvZ29fbGFyZ2UucG5nIiwiaWF0IjoxNzcyNjYwMDQ2LCJleHAiOjMzMzA4NjYwMDQ2fQ.C4CUV_phYLpJZrHCl1dYCO_X1X7b5fKiIli6IKTn4Ew" alt="El-kretsen" class="h-12 mx-auto mb-8">
            <form id="login-form" class="space-y-4 text-left">
                <input type="email" id="email" placeholder="E-post" required class="w-full p-4 bg-white/80 border border-gray-200 rounded-xl focus:ring-2 outline-none transition-all">
                <input type="password" id="password" placeholder="Lösenord" required class="w-full p-4 bg-white/80 border border-gray-200 rounded-xl focus:ring-2 outline-none transition-all">
                <button type="submit" class="kk-primary-btn mt-2 py-4">Logga in på Intranätet</button>
                <p id="error-message" class="text-red-500 text-sm hidden text-center"></p>
            </form>
        </div>
    </div>

    <!-- ── INTRANÄT ── -->
    <div id="intranet-screen" class="hidden h-full flex flex-col content-relative">

        <header class="bg-white/80 backdrop-blur-lg border-b border-white/40 p-4 flex justify-between items-center shadow-sm z-20 relative">
            <div class="flex items-center gap-4">
                <img src="https://jnwatbnkdzuyhqmcerej.supabase.co/storage/v1/object/sign/Logotyper/Untitled%20folder/logo_large.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9hMDg2ZWVkMy1mZDdhLTQ0NWYtOTY5OS1iMDViNDE1NDI5MzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJMb2dvdHlwZXIvVW50aXRsZWQgZm9sZGVyL2xvZ29fbGFyZ2UucG5nIiwiaWF0IjoxNzcyNjYwMDQ2LCJleHAiOjMzMzA4NjYwMDQ2fQ.C4CUV_phYLpJZrHCl1dYCO_X1X7b5fKiIli6IKTn4Ew" alt="El-kretsen" class="h-10 w-auto drop-shadow-sm">
                <h1 class="text-xl font-black uppercase tracking-wider border-l-2 pl-4 border-gray-300/50 hidden sm:block text-gray-700" style="font-family:'Barlow Condensed',sans-serif">Intranät</h1>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
                <div class="hidden sm:flex bg-white/60 p-1.5 rounded-full border border-gray-200/50 shadow-inner">
                    <button onclick="setTheme('default')" class="w-6 h-6 rounded-full bg-[#06B4E4] border-2 border-white shadow-sm mr-1.5 hover:scale-110 transition-transform" title="Havet"></button>
                    <button onclick="setTheme('green')"   class="w-6 h-6 rounded-full bg-[#10B981] border-2 border-white shadow-sm mr-1.5 hover:scale-110 transition-transform" title="Skog"></button>
                    <button onclick="setTheme('yellow')"  class="w-6 h-6 rounded-full bg-[#EAB308] border-2 border-white shadow-sm mr-1.5 hover:scale-110 transition-transform" title="Citroner"></button>
                    <button onclick="setTheme('purple')"  class="w-6 h-6 rounded-full bg-[#8B5CF6] border-2 border-white shadow-sm hover:scale-110 transition-transform" title="Universum"></button>
                </div>
                <button onclick="document.getElementById('feedback-modal').classList.remove('hidden')" class="text-xs font-bold uppercase text-gray-600 hover:text-[var(--primary)] transition-colors bg-white/80 px-3 py-2 rounded-lg border border-gray-200 shadow-sm flex items-center gap-1.5">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"></path></svg>
                    <span class="hidden sm:inline">Feedback</span>
                </button>
                <button id="logout-btn" class="text-xs font-bold uppercase text-gray-600 hover:text-red-500 transition-colors bg-white/80 px-3 py-2 rounded-lg border border-gray-200 shadow-sm">Logga ut</button>
            </div>
        </header>

        <!-- Feedback Modal -->
        <div id="feedback-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
            <div class="bg-white rounded-3xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col" style="height: 85vh;">
                <div class="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-gray-50/80">
                    <h3 class="font-bold text-gray-800 text-lg">Skicka feedback</h3>
                    <button onclick="document.getElementById('feedback-modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-800 bg-white shadow-sm border border-gray-200 rounded-full w-8 h-8 flex items-center justify-center transition-colors">&times;</button>
                </div>
                <div class="flex-1 overflow-hidden w-full bg-gray-50">
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdCmi8SVddoUUufsWVYSR84yjggY4FoUGH6xoAmkY1L09JMKQ/viewform?embedded=true" width="100%" height="100%" frameborder="0" marginheight="0" marginwidth="0">Läser in …</iframe>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="bg-white/60 backdrop-blur-md border-b border-white/30 px-6 flex items-center gap-1 shadow-sm overflow-x-auto">
            <button id="tab-elvis" class="nav-tab active flex items-center gap-2" onclick="switchTab('elvis')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"></path></svg>
                Fråga ELvis
            </button>
            <button id="tab-ai" class="nav-tab flex items-center gap-2 whitespace-nowrap" onclick="switchTab('ai')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v3"/></svg>
                AI-analys
                <span class="ml-1 px-2 py-0.5 shadow-sm text-white text-[10px] rounded-full font-black" style="background:var(--primary)">NY</span>
            </button>
            <button id="tab-kretskampen" class="nav-tab flex items-center gap-2 whitespace-nowrap" onclick="switchTab('kretskampen')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Kretskampen
            </button>
        </nav>

        <!-- ── TAB: ELvis ── -->
        <div id="content-elvis" class="flex flex-1 overflow-hidden p-4 sm:p-6 gap-6">
            <main class="flex-1 bg-white/95 backdrop-blur-xl rounded-3xl shadow-xl overflow-hidden border border-white/50 flex flex-col">
                <zapier-interfaces-chatbot-embed is-popup='false' chatbot-id='cmkpsh9h5001bobaanf41g3v6' style='width: 100%; height: 100%;'></zapier-interfaces-chatbot-embed>
            </main>
            <aside class="w-1/3 max-w-sm bg-white/95 backdrop-blur-xl rounded-3xl shadow-xl p-6 flex flex-col border border-white/50 overflow-hidden">
                <div class="mb-4 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shadow-sm" style="color:var(--primary);background:var(--primary-light)">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"></path></svg>
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-800 leading-none">Dokumentbank</h2>
                        <p class="text-xs font-semibold text-gray-500 mt-1">Sök bland rutiner och manualer</p>
                    </div>
                </div>
                <div class="mb-6 p-4 bg-gray-50/80 rounded-2xl border border-gray-100">
                    <input type="file" id="file-upload" class="block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-white file:text-gray-700 hover:file:bg-gray-100 cursor-pointer mb-3 shadow-sm border border-gray-200">
                    <button id="upload-btn" class="w-full bg-white border-2 text-xs font-bold py-2 rounded-xl transition hover:shadow-md" style="border-color:var(--primary);color:var(--primary)">+ Ladda upp till ELvis</button>
                    <p id="upload-status" class="text-xs mt-2 hidden text-center font-bold"></p>
                </div>
                <div class="mb-4 relative">
                    <input type="text" id="search-input" placeholder="Sök efter en fil..." class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none text-sm font-medium transition-all">
                    <svg class="w-5 h-5 text-gray-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <ul class="space-y-3 flex-1 overflow-y-auto pr-2" id="document-list">
                    <li class="text-sm text-gray-400 font-medium text-center py-10">Laddar dokument...</li>
                </ul>
            </aside>
        </div>

        <!-- ── TAB: AI-ANALYS ── -->
        <div id="content-ai" class="hidden flex-1 overflow-hidden p-4 sm:p-6">
            <div id="ai-chat-root" class="h-full"></div>
        </div>

        <!-- ── TAB: KRETSKAMPEN ── -->
        <div id="content-kretskampen" class="hidden flex-1 overflow-auto relative z-10">
            <div id="quiz-root" style="min-height:100%"></div>
        </div>
    </div>

    <!-- ── Scripts ── -->
    <script src="js/config.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/documents.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/ai-assistant.js"></script>
    <script type="text/babel" data-presets="react" src="components/kretskampen.js"></script>
</body>
</html>
