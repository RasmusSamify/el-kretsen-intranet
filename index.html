        /* ── Tab-navigation ── */
        .nav-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 14px 20px; font-size: 14px; font-weight: 600;
            border-bottom: 3px solid transparent; color: #6B7280;

            background: linear-gradient(135deg, #06B4E4, #0891B2);

        .kk-primary-btn {
            width: 100%; padding: 15px 0; background: linear-gradient(135deg, #06B4E4 0%, #0891B2 100%);

    <script>
        // ── Supabase ──
        const SUPABASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impud2F0Ym5rZHp1eWhxbWNlcmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzczNDcsImV4cCI6MjA4ODA1MzM0N30._A6BCYepTsITJNYgJBUPb79TDR3ln45DPvbmy8Igyoo';
        const BUCKET_NAME = 'intranet-dokument';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginScreen    = document.getElementById('login-screen');
        const intranetScreen = document.getElementById('intranet-screen');
        const loginForm      = document.getElementById('login-form');
        const errorMsg       = document.getElementById('error-message');
        const logoutBtn      = document.getElementById('logout-btn');
        const documentList   = document.getElementById('document-list');
        const searchInput    = document.getElementById('search-input');
        const fileUpload     = document.getElementById('file-upload');
        const uploadBtn      = document.getElementById('upload-btn');
        const uploadStatus   = document.getElementById('upload-status');

        let quizMounted = false;
        function switchTab(tab) {
            const tabs    = ['elvis', 'kretskampen'];
            const tabBtns = { elvis: document.getElementById('tab-elvis'), kretskampen: document.getElementById('tab-kretskampen') };
            const contents = { elvis: document.getElementById('content-elvis'), kretskampen: document.getElementById('content-kretskampen') };
            tabs.forEach(t => {
                tabBtns[t].classList.toggle('active', t === tab);
                contents[t].classList.toggle('hidden', t !== tab);
            });
            if (tab === 'kretskampen' && !quizMounted) {
                quizMounted = true;
                const root = ReactDOM.createRoot(document.getElementById('quiz-root'));
                root.render(React.createElement(window.KretskampenApp));
            }
        }

        async function loadDocuments() {
            const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).list();
            if (error) { documentList.innerHTML = 'Fel vid laddning'; return; }
            documentList.innerHTML = '';
            data.forEach(file => {
                if (file.name === '.emptyFolderPlaceholder') return;
                const { data: publicUrlData } = supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(file.name);
                const li = document.createElement('li');
                li.className = 'doc-item';
                li.innerHTML = `<a class="flex items-center p-3 rounded-lg hover:bg-gray-50 border border-transparent hover:border-gray-200 transition-all text-gray-700 hover:text-[#06B4E4] group cursor-pointer font-medium text-sm truncate">${file.name}</a>`;
                li.addEventListener('click', () => window.open(publicUrlData.publicUrl, '_blank'));
                documentList.appendChild(li);
            });
        }

        uploadBtn.addEventListener('click', async () => {
            const file = fileUpload.files[0];
            if (!file) return;
            const { error } = await supabaseClient.storage.from(BUCKET_NAME).upload(file.name, file, { upsert: true });
            if (!error) { loadDocuments(); fileUpload.value = ''; }
        });

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) showIntranet();
        }
        checkSession();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });
            if (error) { errorMsg.textContent = 'Fel e-post eller lösenord'; errorMsg.classList.remove('hidden'); }
            else { showIntranet(); }
        });

        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            location.reload();
        });

        function showIntranet() {
            loginScreen.classList.add('hidden');
            intranetScreen.classList.remove('hidden');
            loadDocuments();
        }
    </script>

    <script type="text/babel" data-presets="react">
        const KNOWLEDGE_BASE_URL = 'https://jnwatbnkdzuyhqmcerej.supabase.co/storage/v1/object/sign/Quiz%20dokument/Elkretsen_Kunskapsbas_Samlad_Quiz.txt?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9hMDg2ZWVkMy1mZDdhLTQ0NWYtOTY5OS1iMDViNDE1NDI5MzciLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJRdWl6IGRva3VtZW50L0Vsa3JldHNlbl9LdW5za2Fwc2Jhc19TYW1sYWRfUXVpei50eHQiLCJpYXQiOjE3NzI2NTI2NzYsImV4cCI6NDkyNjI1MjY3Nn0.3zkcFjaJmwLPFEoWa9sJx15eq2xil9NiteRPb76mtKQ';
        let cachedKnowledgeBase = null;

        async function getKnowledgeBase() {
            if (cachedKnowledgeBase) return cachedKnowledgeBase;
            try {
                const response = await fetch(KNOWLEDGE_BASE_URL);
                if (!response.ok) throw new Error('Kunde inte läsa textfilen');
                cachedKnowledgeBase = await response.text();
                return cachedKnowledgeBase;
            } catch (error) {
                console.error('Kunde inte hämta kunskapsbasen:', error);
                throw error;
            }
        }

        const CATEGORIES = [
            { id: 'all', label: 'Alla kategorier', emoji: '⚡' },
            { id: 'C', label: 'EU & Reglering',      emoji: '🇪🇺' },
            { id: 'A', label: 'Ekonomi & Deklaration',emoji: '💰' },
            { id: 'B', label: 'Teknik & Produkter',   emoji: '🔧' },
            { id: 'D', label: 'Juridik & Sanktioner', emoji: '⚖️' },
        ];
        const ANSWER_COLORS  = ['#EF4444','#3B82F6','#22C55E','#F59E0B'];
        const ANSWER_ICONS   = ['▲','◆','●','✦'];
        const TIME_PER_Q     = 20;

        async function loadScores() {
            const { data } = await supabaseClient.from('kretskampen_scores').select('*').order('score', { ascending: false }).limit(50);
            return data || [];
        }
        async function saveScore(entry) {
            await supabaseClient.from('kretskampen_scores').insert([entry]);
        }

        async function generateQuestions(category, count) {
            const catLabel = category === 'all' ? 'alla kategorier' : CATEGORIES.find(c => c.id === category)?.label;
            const knowledgeBaseText = await getKnowledgeBase();
            
            // "GÖMD KLOCKA" (Random Seed) för variation
            const sessionSeed = new Date().getTime();

            const prompt = `SESSION_ID: ${sessionSeed}
Du är quizmaster för El-kretsen. Skapa unika frågor!
INSTRUKTION FÖR SLUMPMÄSSIGHET:
- Använd SESSION_ID som seed.
- Plocka frågor från HELA dokumentet, hoppa runt!
Kunskapsbas:
${knowledgeBaseText}
Generera exakt ${count} flervalsfrågor på SVENSKA om kategori: ${catLabel}.
Svara ENBART med JSON:
{ "questions": [ { "question": "Text?", "answers": ["A","B","C","D"], "correct": 0, "explanation": "Varför?" } ] }`;

            const res = await fetch('https://jnwatbnkdzuyhqmcerej.supabase.co/functions/v1/smooth-action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await res.json();
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
            const clean = text.replace(/```json|```/g, '').trim();
            return JSON.parse(clean).questions;
        }

        function calcScore(timeLeft, correct) {
            return correct ? Math.round(500 + (timeLeft / TIME_PER_Q) * 500) : 0;
        }

        function TimerRing({ timeLeft, total }) {
            const r = 34, cx = 42, cy = 42, circ = 2 * Math.PI * r;
            const offset = circ * (1 - timeLeft / total);
            const color  = timeLeft > 10 ? '#06B4E4' : timeLeft > 5 ? '#F59E0B' : '#EF4444';
            return (
                <div style={{ position:'relative', width:84, height:84 }}>
                    <svg width="84" height="84" style={{ transform:'rotate(-90deg)' }}>
                        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#E5E7EB" strokeWidth={6}/>
                        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={6} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{ transition:'stroke-dashoffset 1s linear' }}/>
                    </svg>
                    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, fontWeight:900, color, fontFamily:"'Barlow Condensed'" }}>{timeLeft}</div>
                </div>
            );
        }

        function HomeScreen({ onStart, onLeaderboard }) {
            const [name, setName] = React.useState('');
            const [category, setCategory] = React.useState('all');
            const [qCount, setQCount] = React.useState(10);
            return (
                <div className="kk-home-bg">
                    <div style={{ width:'100%', maxWidth:460, background:'linear-gradient(135deg, #06B4E4 0%, #0369A1 100%)', borderRadius:'20px 20px 0 0', padding:'28px', color:'white' }}>
                        <div style={{ display:'flex', justifyContent:'space-between' }}>
                            <div><div style={{ fontFamily:"'Barlow Condensed'", fontSize:32, fontWeight:900 }}>⚡ KRETSKAMPEN</div><div style={{ fontSize:14 }}>Testa din kunskap</div></div>
                            <button onClick={onLeaderboard} className="kk-ghost-btn" style={{ color:'white', borderColor:'white' }}>🏆 Highscore</button>
                        </div>
                    </div>
                    <div className="kk-card" style={{ borderRadius:'0 0 20px 20px' }}>
                        <div className="kk-label">Ditt namn</div>
                        <input className="kk-input mb-4" value={name} onChange={e => setName(e.target.value)} maxLength={20}/>
                        <div className="kk-label">Kategori</div>
                        {CATEGORIES.map(cat => <button key={cat.id} className={`kk-cat-btn ${category === cat.id ? 'selected' : ''}`} onClick={() => setCategory(cat.id)}>{cat.emoji} {cat.label}</button>)}
                        <div className="kk-label mt-4">Antal frågor</div>
                        <div className="flex gap-2 mb-6">{[5,10,15].map(n => <button key={n} className={`kk-qcount-btn ${qCount === n ? 'selected' : ''}`} onClick={() => setQCount(n)}>{n} st</button>)}</div>
                        <button className="kk-primary-btn" disabled={!name} onClick={() => onStart(name, category, qCount)}>⚡ Starta quiz</button>
                    </div>
                </div>
            );
        }

        function QuizScreen({ questions, playerName, onFinish }) {
            const [qIdx, setQIdx] = React.useState(0);
            const [selected, setSelected] = React.useState(null);
            const [timeLeft, setTimeLeft] = React.useState(TIME_PER_Q);
            const [score, setScore] = React.useState(0);
            const [history, setHistory] = React.useState([]);
            const [showExpl, setShowExpl] = React.useState(false);
            const timerRef = React.useRef();
            const q = questions[qIdx];

            const handleSelect = (idx) => {
                if (selected !== null) return;
                clearInterval(timerRef.current);
                setSelected(idx);
                const gained = calcScore(timeLeft, idx === q.correct);
                setScore(s => s + gained);
                setHistory(h => [...h, { gained, correct: idx === q.correct, timeLeft }]);
                setShowExpl(true);
            };

            React.useEffect(() => {
                setSelected(null); setTimeLeft(TIME_PER_Q); setShowExpl(false);
                timerRef.current = setInterval(() => {
                    setTimeLeft(t => { if(t <= 1){ clearInterval(timerRef.current); handleSelect(-1); return 0; } return t - 1; });
                }, 1000);
                return () => clearInterval(timerRef.current);
            }, [qIdx]);

            return (
                <div className="flex flex-col min-h-full">
                    <div style={{ background:'linear-gradient(135deg,#06B4E4,#0369A1)', padding:'20px', display:'flex', justifyContent:'space-between', color:'white' }}>
                        <div><div style={{ fontSize:12, opacity:0.7 }}>Fråga {qIdx+1}/{questions.length}</div><div style={{ fontSize:20, fontWeight:700 }}>{playerName}</div></div>
                        <TimerRing timeLeft={timeLeft} total={TIME_PER_Q}/>
                        <div className="text-right"><div style={{ fontSize:12, opacity:0.7 }}>Poäng</div><div style={{ fontSize:28, fontWeight:900 }}>{score}</div></div>
                    </div>
                    <div style={{ flex:1, padding:20, background:'#F8FAFC' }}>
                        <div className="bg-white p-6 rounded-xl shadow-sm text-center mb-6"><div style={{ fontSize:22, fontWeight:600 }}>{q.question}</div></div>
                        <div className="grid grid-cols-2 gap-4">
                            {q.answers.map((ans, i) => (
                                <button key={i} className="kk-answer-btn" style={{ background: selected === null ? ANSWER_COLORS[i] : (i === q.correct ? '#16A34A' : (i === selected ? '#6B7280' : ANSWER_COLORS[i]+'55')) }} onClick={() => handleSelect(i)} disabled={selected !== null}>
                                    <div style={{ fontSize:22 }}>{ANSWER_ICONS[i]}</div><div style={{ fontSize:16, fontWeight:600 }}>{ans}</div>
                                </button>
                            ))}
                        </div>
                        {showExpl && (
                            <div className="kk-fadein mt-6 p-6 rounded-xl border-l-4" style={{ background: selected === q.correct ? '#F0FDF4' : '#FFF1F2', borderColor: selected === q.correct ? '#16A34A' : '#DC2626' }}>
                                <div style={{ fontWeight:700, fontSize:18, color: selected === q.correct ? '#16A34A' : '#DC2626' }}>{selected === q.correct ? '✓ Rätt!' : '✗ Fel svar'}</div>
                                <div className="mt-2 text-lg">{q.explanation}</div>
                                <button className="kk-primary-btn mt-4" onClick={() => qIdx < questions.length - 1 ? setQIdx(qIdx+1) : onFinish(score, history)}>{qIdx < questions.length - 1 ? 'Nästa fråga →' : 'Se resultat'}</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function LeaderboardScreen({ onBack, currentPlayer, currentScore }) {
            const [scores, setScores] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            React.useEffect(() => { loadScores().then(d => { setScores(d); setLoading(false); }); }, []);

            return (
                <div className="flex flex-col min-h-full">
                    <div style={{ background:'linear-gradient(135deg,#06B4E4,#0369A1)', padding:'24px 20px', color:'white' }}>
                        <button onClick={onBack} className="mb-4 opacity-80 hover:opacity-100">← Gå tillbaka</button>
                        <h2 style={{ fontFamily:"'Barlow Condensed'", fontSize:36, fontWeight:900 }}>🏆 HIGHSCORE</h2>
                        <p style={{ opacity:0.8 }}>Topp 50 hjältar hos El-kretsen</p>
                    </div>
                    <div style={{ flex:1, padding:16, background:'#F8FAFC', display:'flex', flexDirection:'column', gap:8 }}>
                        {loading ? <div className="text-center py-20"><div className="kk-dot"/><div className="kk-dot"/><div className="kk-dot"/></div> :
                        scores.map((s, i) => {
                            const isMe = s.name === currentPlayer && s.score === currentScore;
                            const medalClass = i === 0 ? 'kk-rank-gold' : i === 1 ? 'kk-rank-silver' : i === 2 ? 'kk-rank-bronze' : '';
                            const catEmoji = CATEGORIES.find(c => c.id === s.category)?.emoji || '⚡';
                            return (
                                <div key={i} className={`kk-score-row ${medalClass}`} style={isMe ? { border: '2px solid #06B4E4', boxShadow: '0 0 15px rgba(6,180,228,0.2)' } : {}}>
                                    <div style={{ fontSize:22, fontWeight:900, minWidth:40, textAlign:'center', color: i < 3 ? '#1E293B' : '#94A3B8', fontFamily:"'Barlow Condensed'" }}>
                                        {i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}
                                    </div>
                                    <div style={{ flex:1 }}>
                                        <div style={{ fontWeight:700, fontSize:15 }}>{s.name} {isMe && '(Dig)'}</div>
                                        <div style={{ fontSize:11, color:'#64748B' }}>{catEmoji} · {s.correct}/{s.total} rätt · {new Date(s.played_at).toLocaleDateString()}</div>
                                    </div>
                                    <div style={{ fontSize:24, fontWeight:900, color:'#06B4E4', fontFamily:"'Barlow Condensed'" }}>{s.score.toLocaleString()}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function ResultScreen({ playerName, score, totalQ, sessionScores, onHome, onLeaderboard }) {
            const correct = sessionScores.filter(s => s.correct).length;
            return (
                <div className="kk-home-bg">
                    <div className="kk-card text-center">
                        <div style={{ fontSize:64, marginBottom:10 }}>{correct / totalQ >= 0.8 ? '🏆' : '👍'}</div>
                        <h2 style={{ fontFamily:"'Barlow Condensed'", fontSize:32, fontWeight:900 }}>Bra jobbat, {playerName}!</h2>
                        <div className="bg-blue-50 p-8 rounded-2xl my-6">
                            <div style={{ fontSize:14, textTransform:'uppercase', opacity:0.6 }}>Din poäng</div>
                            <div style={{ fontSize:56, fontWeight:900, color:'#06B4E4', fontFamily:"'Barlow Condensed'" }}>{score}</div>
                        </div>
                        <button className="kk-primary-btn mb-3" onClick={onLeaderboard}>Se highscore-tavlan</button>
                        <button className="kk-ghost-btn w-full" onClick={onHome}>Spela igen</button>
                    </div>
                </div>
            );
        }

        function KretskampenApp() {
            const [screen, setScreen] = React.useState('home');
            const [playerName, setPlayerName] = React.useState('');
            const [questions, setQuestions] = React.useState([]);
            const [finalScore, setFinalScore] = React.useState(0);
            const [sessionScores, setSessionScores] = React.useState([]);
            const [error, setError] = React.useState(null);

            const handleStart = async (name, cat, count) => {
                setPlayerName(name); setScreen('loading'); setError(null);
                try { setQuestions(await generateQuestions(cat, count)); setScreen('quiz'); }
                catch(e) { setError('Kunde inte generera frågor.'); setScreen('home'); }
            };
            const handleFinish = async (score, h) => {
                setFinalScore(score); setSessionScores(h);
                await saveScore({ name:playerName, score, correct:h.filter(x=>x.correct).length, total:questions.length, category:'all', played_at:new Date().toISOString() });
                setScreen('result');
            };
            return (
                <div className="min-h-full">
                    {error && <div className="bg-red-100 p-2 text-center text-xs text-red-700">{error}</div>}
                    {screen === 'home' && <HomeScreen onStart={handleStart} onLeaderboard={() => setScreen('leaderboard')}/>}
                    {screen === 'loading' && <div className="kk-home-bg"><div className="kk-card text-center"><div className="kk-dot"/><div className="kk-dot"/><div className="kk-dot"/><h2 className="mt-4 font-bold">AI skapar dina frågor...</h2></div></div>}
                    {screen === 'quiz' && <QuizScreen questions={questions} playerName={playerName} onFinish={handleFinish}/>}
                    {screen === 'result' && <ResultScreen playerName={playerName} score={finalScore} totalQ={questions.length} sessionScores={sessionScores} onHome={() => setScreen('home')} onLeaderboard={() => setScreen('leaderboard')}/>}
                    {screen === 'leaderboard' && <LeaderboardScreen onBack={() => setScreen(finalScore ? 'result' : 'home')} currentPlayer={playerName} currentScore={finalScore}/>}
                </div>
            );
        }
        window.KretskampenApp = KretskampenApp;
    </script>
</body>
</html>
